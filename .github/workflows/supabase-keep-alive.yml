name: Supabase Keep Alive

on:
  schedule:
    # 06:00 UTC every Monday and Thursday (~3-4 day max gap, well under 7)
    - cron: "0 6 * * 1,4"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      # A real write (upsert) is unambiguous DB activity; a read may not count.
      # Uses the service_role key so RLS is bypassed. If you'd rather use the
      # anon key, add an INSERT/UPDATE RLS policy on keep_alive for the anon role.
      - name: Upsert into Supabase to reset the 7-day inactivity timer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          # service_role key bypasses RLS - appropriate for a server-side cron.
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          body=$(curl -sS -w $'\n%{http_code}' \
            -X POST "${SUPABASE_URL}/rest/v1/keep_alive?on_conflict=id" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates,return=minimal" \
            -d '[{"id":1}]')
          code=$(printf '%s' "$body" | tail -n1)
          echo "Response body: $(printf '%s' "$body" | sed '$d')"
          echo "Supabase responded with HTTP $code"
          case "$code" in
            200|201|204) ;;
            *) echo "Unexpected status - failing so the run shows up as red."; exit 1 ;;
          esac
