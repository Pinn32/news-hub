name: Supabase Keep Alive

on:
  schedule:
    # 06:00 UTC every Monday and Thursday (~3-4 day max gap, well under 7)
    - cron: "0 6 * * 1,4"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase to reset the 7-day inactivity timer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/keep_alive?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          echo "Supabase responded with HTTP $code"
          if [ "$code" != "200" ]; then
            echo "Unexpected status - failing so the run shows up as red."
            exit 1
          fi
