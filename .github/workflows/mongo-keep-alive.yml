name: MongoDB Keep Alive

on:
  schedule:
    - cron: "0 6 * * 0"   # 06:00 UTC every Sunday (weekly, wide margin under 30 days)
  workflow_dispatch: {}   # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Connect to MongoDB to reset the inactivity timer
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: node scripts/keep-alive-mongo.mjs
